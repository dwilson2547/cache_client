name: cache-client-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

  publish-pypi:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Fail if version already exists on PyPI
        run: |
          python - <<'PY'
          import pathlib, tomllib, urllib.error, urllib.request
          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          name = pyproject["project"]["name"]
          version = pyproject["project"]["version"]
          url = f"https://pypi.org/pypi/{name}/{version}/json"
          try:
              urllib.request.urlopen(url)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"{name}=={version} is new on PyPI")
              else:
                  raise
          else:
              raise SystemExit(f"{name}=={version} already exists on PyPI")
          PY

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
